<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROHUB - Панели Админ</title>
    <style>
        body { background-color: #141414; color: white; font-family: sans-serif; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .admin-box { background: #1f1f1f; padding: 30px; border-radius: 12px; width: 100%; max-width: 450px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #00adb5; margin-bottom: 20px; text-align: center; font-size: 24px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        input:focus, textarea:focus { border-color: #00adb5; outline: none; }
        .admin-btn { background: #00adb5; color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 6px; width: 100%; font-size: 16px; transition: background 0.2s; }
        .admin-btn:hover { background: #008c9e; }
        .hidden { display: none; }
        .label-txt { display: block; margin-bottom: 5px; color: #aaa; font-size: 13px; text-align: left; }
        .info-note { background: #2c3e50; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 15px; border-left: 4px solid #3498db; text-align: left; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>ZEROHUB – ПАНЕЛИ АДМИН</h2>
        
        <div id="setup-form" class="hidden">
            <div class="info-note">Базаи шумо навест! Пароли асосии худро барои сайт эҷод кунед. Ин паролро ҳар вақт хоҳед иваз карда метавонед.</div>
            <span class="label-txt">Пароли навро нависед:</span>
            <input type="password" id="new-admin-pass" placeholder="Пароли нав">
            <button class="admin-btn" onclick="setupPassword()">САБТ КАРДАНИ ПАРОЛ</button>
        </div>

        <div id="login-form" class="hidden">
            <span class="label-txt">Пароли махфиро ворид кунед:</span>
            <input type="password" id="admin-pass" placeholder="••••••••">
            <button class="admin-btn" onclick="checkPassword()">ВЕРИФИКАЦИЯ</button>
        </div>

        <div id="upload-form" class="hidden">
            <span class="label-txt">Номи филм ё маҳсулот:</span>
            <input type="text" id="movie-title" placeholder="Масалан: GTA San Andreas">
            
            <span class="label-txt">Ссылкаи расм (URL):</span>
            <input type="text" id="movie-img" placeholder="https://site.com/image.jpg">
            
            <span class="label-txt">Тавсифи кӯтоҳ (барои Google SEO):</span>
            <textarea id="movie-desc" rows="3" placeholder="Дар бораи ин маҳсулот кӯтоҳ нависед..."></textarea>
            
            <span class="label-txt">Ссылка барои Скачат ё Тамошо:</span>
            <input type="text" id="movie-link" placeholder="https://t.me/yourchannel">
            
            <button class="admin-btn" onclick="addMovie()">ИЛОВА КАРДАН БА САЙТ</button>
        </div>
    </div>

    <script>
        const passURL = "https://zerohub2010-default-rtdb.firebaseio.com/secret_password.json";
        const databaseURL = "https://zerohub2010-default-rtdb.firebaseio.com/movies.json";

        async function checkDatabaseStatus() {
            try {
                const response = await fetch(passURL);
                const data = await response.json();
                
                if (data === null) {
                    document.getElementById('setup-form').classList.remove('hidden');
                } else {
                    document.getElementById('login-form').classList.remove('hidden');
                }
            } catch (error) {
                alert("Хатогӣ дар пайвастшавӣ ба Firebase!");
            }
        }

        async function setupPassword() {
            const newPass = document.getElementById('new-admin-pass').value;
            if(!newPass) { alert("Лутфан паролро нависед!"); return; }

            await fetch(passURL, {
                method: "PUT",
                body: JSON.stringify(newPass)
            });

            alert("Парол бомуваффақият дар база сабт шуд!");
            location.reload();
        }

        async function checkPassword() {
            const inputPass = document.getElementById('admin-pass').value;
            
            const response = await fetch(passURL);
            const correctPassword = await response.json();

            if(inputPass === String(correctPassword)) {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('upload-form').classList.remove('hidden');
            } else {
                alert("Пароли хато! Дастрасӣ манъ аст.");
            }
        }

        async function addMovie() {
            const title = document.getElementById('movie-title').value;
            const img = document.getElementById('movie-img').value;
            const desc = document.getElementById('movie-desc').value;
            const link = document.getElementById('movie-link').value;

            if(!title || !img || !link) {
                alert("Лутфан Ном, Расм ва Ссылкаро пур кунед!");
                return;
            }

            const newMovie = { title, img, desc, link };

            await fetch(databaseURL, {
                method: "POST",
                body: JSON.stringify(newMovie)
            });

            document.getElementById('movie-title').value = "";
            document.getElementById('movie-img').value = "";
            document.getElementById('movie-desc').value = "";
            document.getElementById('movie-link').value = "";
            
            alert("Муваффақият! Маҳсулот ба ZEROHUB илова шуд.");
        }

        checkDatabaseStatus();
    </script>
</body>
</html>
