<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROHUB Admin v2.0 Max</title>
    <meta name="google-site-verification" content="googlea353b2db1c2f7dbe.html">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12;
            color: #e5e5e7;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            background-color: #16161a;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            border: 1px solid #24242b;
        }
        h2, h3 {
            text-align: center;
            color: #34c759;
            margin-top: 0;
        }
        h3 { color: #ff9500; margin-top: 40px; }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .full-width {
            grid-column: span 2;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #a1a1aa;
            font-size: 14px;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #2e2e38;
            border-radius: 8px;
            background-color: #1f1f24;
            color: #fff;
            box-sizing: border-box;
            font-size: 15px;
            transition: 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #34c759;
            outline: none;
            background-color: #25252b;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #34c759;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background-color: #28a745; }
        .product-list { margin-top: 30px; }
        .product-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1f1f24;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #2e2e38;
        }
        .product-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .product-info img {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 12px;
            background: #16161a;
            border: 1px solid #333;
        }
        .product-details {
            display: flex;
            flex-direction: column;
        }
        .product-details span {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 2px;
        }
        .actions { display: flex; gap: 8px; }
        .btn-edit {
            background-color: #ff9500;
            padding: 6px 12px;
            font-size: 13px;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-delete {
            background-color: #ff3b30;
            padding: 6px 12px;
            font-size: 13px;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #login-block {
            max-width: 400px;
            margin: 100px auto;
            background: #16161a;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #24242b;
            text-align: center;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div id="login-block">
    <h2>Вход в ZEROHUB CMS Max</h2>
    <label for="admin-pass">Пароли админро ворид кунед:</label>
    <input type="password" id="admin-pass" placeholder="Парол...">
    <button onclick="checkLogin()">ВХОД</button>
</div>

<div class="container" id="admin-panel" style="display: none;">
    <h2 id="form-title">ZEROHUB CMS v2.0 Max</h2>
    
    <form id="product-form">
        <input type="hidden" id="product-id">
        
        <div class="form-grid">
            <div class="full-width">
                <label for="title">Номи маҳсулот / Барнома:</label>
                <input type="text" id="title" required placeholder="Масалан: WoolPop icon pack">
            </div>

            <div>
                <label for="category">Категория:</label>
                <select id="category" required>
                    <option value="Программы">Программы</option>
                    <option value="Игры">Игры</option>
                    <option value="Иконки">Иконки</option>
                    <option value="Моды">Моды</option>
                </select>
            </div>

            <div>
                <label for="version">Версия:</label>
                <input type="text" id="version" required placeholder="Масалан: v1.2.0">
            </div>

            <div>
                <label for="size">Ҳаҷми файл (Размер):</label>
                <input type="text" id="size" required placeholder="Масалан: 45 MB">
            </div>

            <div class="full-width">
                <label for="image">Линки Иконка (URL):</label>
                <input type="url" id="image" required placeholder="Линки иконкаи асосии барнома...">
            </div>

            <div class="full-width">
                <label for="screen1">Линки Скриншоти 1 (URL):</label>
                <input type="url" id="screen1" required placeholder="Линки скриншоти якуми дохили барнома...">
            </div>

            <div>
                <label for="screen2">Линки Скриншоти 2 (URL):</label>
                <input type="url" id="screen2" placeholder="Линки скриншоти дуюм (хоҳишмандӣ)...">
            </div>

            <div>
                <label for="screen3">Линки Скриншоти 3 (URL):</label>
                <input type="url" id="screen3" placeholder="Линки скриншоти сеюм (хоҳишмандӣ)...">
            </div>

            <div class="full-width">
                <label for="link">Линки Скачат (ТГ ё Ссылка):</label>
                <input type="url" id="link" required placeholder="https://t.me/zerohub/124">
            </div>

            <div class="full-width">
                <label for="video">Линки Видео Трейлер (YouTube - Хоҳишмандӣ):</label>
                <input type="url" id="video" placeholder="https://youtube.com/watch?v=...">
            </div>

            <div class="full-width">
                <label for="description">Тавсифи пурра (Описание):</label>
                <textarea id="description" rows="5" required placeholder="Дар бораи барнома пурра навис..."></textarea>
            </div>
        </div>

        <button type="submit" id="submit-btn">САБТ КАРДАН БА БАЗА</button>
    </form>

    <div class="product-list">
        <h3>Рӯйхати Маҳсулоти База</h3>
        <div id="products-container">Боргирӣ...</div>
    </div>
</div>

<script>
    function checkLogin() {
        const pass = document.getElementById('admin-pass').value;
        if (pass === "valijon2010") {
            document.getElementById('login-block').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            initFirebase();
        } else {
            alert("Парол хато аст, бародар!");
        }
    }

    let database;

    function initFirebase() {
        const firebaseConfig = {
            databaseURL: "https://zerohub2010-default-rtdb.firebaseio.com"
        };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        database = firebase.database();
        loadProducts();
    }

    function loadProducts() {
        const productsContainer = document.getElementById('products-container');
        const productForm = document.getElementById('product-form');
        const submitBtn = document.getElementById('submit-btn');
        const formTitle = document.getElementById('form-title');
        const productIdInput = document.getElementById('product-id');

        database.ref('products_v2').on('value', (snapshot) => {
            productsContainer.innerHTML = '';
            const data = snapshot.val();
            if (!data) {
                productsContainer.innerHTML = '<p style="text-align:center; color:#666;">База холӣ аст.</p>';
                return;
            }

            for (let id in data) {
                const p = data[id];
                const item = document.createElement('div');
                item.className = 'product-item';
                item.innerHTML = `
                    <div class="product-info">
                        <img src="${p.image || 'https://via.placeholder.com/150'}" alt="">
                        <div class="product-details">
                            <strong>${p.title}</strong>
                            <span>${p.category} | ${p.version} | ${p.size}</span>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-edit" onclick="editProduct('${id}', '${escape(p.title)}', '${escape(p.description)}', '${p.image}', '${p.link}', '${p.category}', '${p.version}', '${p.size}', '${p.video || ''}', '${p.screen1 || ''}', '${p.screen2 || ''}', '${p.screen3 || ''}')">Редакт</button>
                        <button class="btn-delete" onclick="deleteProduct('${id}')">X</button>
                    </div>
                `;
                productsContainer.appendChild(item);
            }
        });

        productForm.onsubmit = (e) => {
            e.preventDefault();
            const id = productIdInput.value;
            const currentDate = new Date().toLocaleDateString('ru-RU');
            
            const productData = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                version: document.getElementById('version').value,
                size: document.getElementById('size').value,
                image: document.getElementById('image').value,
                screen1: document.getElementById('screen1').value,
                screen2: document.getElementById('screen2').value,
                screen3: document.getElementById('screen3').value,
                link: document.getElementById('link').value,
                video: document.getElementById('video').value,
                description: document.getElementById('description').value,
                date: currentDate
            };

            if (id === '') {
                productData.views = 0;
                productData.downloads = 0;
                database.ref('products_v2').push(productData).then(() => {
                    alert('Маҳсулот бо муваффақият илова шуд!');
                    productForm.reset();
                });
            } else {
                database.ref('products_v2/' + id).update(productData).then(() => {
                    alert('Маҳсулот навсозӣ шуд!');
                    productForm.reset();
                    productIdInput.value = '';
                    formTitle.innerText = "ZEROHUB CMS v2.0 Max";
                    submitBtn.innerText = "САБТ КАРДАН БА БАЗА";
                });
            }
        };
    }

    window.deleteProduct = function(id) {
        if (confirm('Оё ин маҳсулотро аз база нест мекунед?')) {
            database.ref('products_v2/' + id).remove().then(() => {
                alert('Маҳсулот нест карда шуд!');
            });
        }
    }

    window.editProduct = function(id, title, description, image, link, category, version, size, video, screen1, screen2, screen3) {
        document.getElementById('form-title').innerText = "Редактирование Маҳсулот";
        document.getElementById('submit-btn').innerText = "НАВСОЗӢ КАРДАН";
        
        document.getElementById('product-id').value = id;
        document.getElementById('title').value = unescape(title);
        document.getElementById('description').value = unescape(description);
        document.getElementById('image').value = image;
        document.getElementById('link').value = link;
        document.getElementById('category').value = category;
        document.getElementById('version').value = version;
        document.getElementById('size').value = size;
        document.getElementById('video').value = video;
        document.getElementById('screen1').value = screen1;
        document.getElementById('screen2').value = screen2;
        document.getElementById('screen3').value = screen3;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
