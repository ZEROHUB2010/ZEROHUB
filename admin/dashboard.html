<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ZEROHUB Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#0f1115;

color:#fff;

display:flex;

min-height:100vh;

overflow-x:hidden;

}

.sidebar{

width:250px;

background:#17191f;

border-right:1px solid #272a31;

padding:25px;

position:fixed;

left:0;

top:0;

bottom:0;

}

.logo{

font-size:28px;

font-weight:700;

color:#35d06e;

margin-bottom:35px;

text-align:center;

}

.menu{

display:flex;

flex-direction:column;

gap:12px;

}

.menu a{

text-decoration:none;

color:#d9d9d9;

padding:14px;

border-radius:12px;

transition:.3s;

font-weight:500;

}

.menu a:hover{

background:#35d06e;

color:#111;

}

.main{

margin-left:250px;

flex:1;

padding:30px;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}

.header h1{

font-size:30px;

}
.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:35px;

}

.card{

background:#1b1e25;

padding:22px;

border-radius:18px;

border:1px solid #2b2f38;

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

border-color:#35d06e;

}

.card h3{

font-size:14px;

color:#9da3ae;

margin-bottom:12px;

}

.card h2{

font-size:32px;

color:#35d06e;

}

.table{

background:#1b1e25;

border-radius:18px;

padding:20px;

border:1px solid #2b2f38;

}

.table h2{

margin-bottom:20px;

}

table{

width:100%;

border-collapse:collapse;

}

th,td{

padding:14px;

text-align:left;

border-bottom:1px solid #2b2f38;

}

th{

color:#35d06e;

}

tr:hover{

background:#232833;

}
.status{

display:inline-block;

padding:6px 12px;

border-radius:20px;

font-size:13px;

font-weight:600;

background:#35d06e22;

color:#35d06e;

}

.add-btn{

background:#35d06e;

color:#111;

padding:12px 18px;

border-radius:12px;

text-decoration:none;

font-weight:600;

transition:.3s;

}

.add-btn:hover{

transform:scale(1.05);

}

@media(max-width:900px){

.sidebar{

width:80px;

padding:20px 10px;

}

.logo{

font-size:18px;

}

.menu a{

font-size:0;

padding:16px;

}

.main{

margin-left:80px;

padding:20px;

}

.header h1{

font-size:22px;

}

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

ZEROHUB

</div>

<div class="menu">

<a href="dashboard.html">🏠 Dashboard</a>

<a href="products.html">📦 Products</a>

<a href="#">📤 Upload</a>

<a href="#">⚙ Settings</a>

<a href="login.html">🚪 Logout</a>

</div>

</div>

<div class="main">
  <div class="header">

<h1>Dashboard</h1>

<a class="add-btn" href="products.html">

+ Add Product

</a>

</div>

<div class="cards">

<div class="card">

<h3>Ҳамаи маҳсулот</h3>

<h2 id="totalProducts">0</h2>

</div>

<div class="card">

<h3>Ҳамаи скачатҳо</h3>

<h2 id="totalDownloads">0</h2>

</div>

<div class="card">

<h3>Ҳамаи боздидҳо</h3>

<h2 id="totalViews">0</h2>

</div>

<div class="card">

<h3>Статус</h3>

<h2 style="color:#35d06e;">ONLINE</h2>

</div>

</div>

<div class="table">

<h2>Маҳсулоти охирин</h2>

<table>

<thead>

<tr>

<th>Ном</th>

<th>Категория</th>

<th>Версия</th>

<th>Ҳолат</th>

</tr>

</thead>

<tbody id="recentProducts">
  </tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase,ref,onValue }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyA_qDc-FbKjLGUF0YTJBQMiLE8sbw8mpGI",

authDomain:"zerohub2010.firebaseapp.com",

databaseURL:"https://zerohub2010-default-rtdb.firebaseio.com",

projectId:"zerohub2010",

storageBucket:"zerohub2010.firebasestorage.app",

messagingSenderId:"10761752021",

appId:"1:10761752021:web:891c5494e298f2c21e815c"

};

const app=initializeApp(firebaseConfig);

const db=getDatabase(app);

const productsRef=ref(db,"products_v2");
onValue(productsRef,(snapshot)=>{

const data=snapshot.val();

let total=0;

let downloads=0;

let views=0;

let html="";

if(data){

Object.keys(data).reverse().forEach((key,index)=>{

const p=data[key];

total++;

downloads+=Number(p.downloads||0);

views+=Number(p.views||0);

if(index<10){

html+=`

<tr>

<td>${p.title}</td>

<td>${p.category}</td>

<td>${p.version}</td>

<td><span class="status">ONLINE</span></td>

</tr>

`;

}

});

}

document.getElementById("totalProducts").innerText=total;

document.getElementById("totalDownloads").innerText=downloads;

document.getElementById("totalViews").innerText=views;

document.getElementById("recentProducts").innerHTML=html;

});
id="m8d2fa"
function updateClock(){

const now=new Date();

const time=now.toLocaleTimeString("ru-RU");

const date=now.toLocaleDateString("ru-RU");

const clock=document.getElementById("clock");

if(clock){

clock.innerHTML=date+" | "+time;

}

}

setInterval(updateClock,1000);

updateClock();

const header=document.querySelector(".header");

const clockBox=document.createElement("div");

clockBox.id="clock";

clockBox.style.color="#35d06e";

clockBox.style.fontWeight="600";

header.appendChild(clockBox);
window.addEventListener("load",()=>{

document.body.style.opacity="0";

setTimeout(()=>{

document.body.style.transition="0.4s";

document.body.style.opacity="1";

},100);

});

document.querySelectorAll(".card").forEach(card=>{

card.addEventListener("mouseenter",()=>{

card.style.boxShadow="0 0 20px rgba(53,208,110,.25)";

});

card.addEventListener("mouseleave",()=>{

card.style.boxShadow="none";

});

});

document.title="ZEROHUB Dashboard";
window.addEventListener("online",()=>{

console.log("Internet Connected");

});

window.addEventListener("offline",()=>{

alert("Интернет қатъ шудааст!");

});

if(localStorage.getItem("zerohub_login")!=="true"){

window.location.href="login.html";

}

history.pushState(null,null,location.href);

window.onpopstate=function(){

history.go(1);

};
localStorage.setItem("zerohub_dashboard","ready");

console.log("ZEROHUB Dashboard Loaded");

</script>

</body>

</html>
