<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROHUB - Панели Мудирият (Admin)</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Стилҳои махсуси Панели Админ */
        .admin-container { margin-top: 30px; display: grid; grid-template-columns: 280px 1fr; gap: 30px; }
        .admin-sidebar { background: var(--bg-card); border: 1px solid var(--border-color); padding: 24px; border-radius: 20px; height: fit-content; }
        .sidebar-menu { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .sidebar-menu button { background: none; border: 1px solid transparent; color: var(--text-muted); text-align: left; padding: 12px 16px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: var(--transition-smooth); }
        .sidebar-menu button:hover, .sidebar-menu button.active { background: var(--bg-hover); color: var(--primary); border-color: var(--border-color); }
        
        /* Сексияи Омори Зинда */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 24px; border-radius: 16px; display: flex; align-items: center; gap: 20px; }
        .stat-icon { width: 50px; height: 50px; background: var(--bg-hover); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 20px; }
        .stat-num { font-size: 24px; font-weight: 700; margin-top: 4px; }
        .stat-label { color: var(--text-muted); font-size: 13px; }

        /* Формаи Иловакунӣ */
        .form-section { background: var(--bg-card); border: 1px solid var(--border-color); padding: 30px; border-radius: 24px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group.full-width { grid-column: span 2; }
        .form-group label { font-size: 14px; font-weight: 600; color: var(--text-muted); }
        .form-group input, .form-group textarea, .form-group select { background: var(--bg-hover); border: 1px solid var(--border-color); padding: 12px 16px; border-radius: 10px; color: var(--text-main); font-size: 14px; outline: none; transition: var(--transition-smooth); }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); }
        
        /* Блоки Drag & Drop ё интихоби пайвандҳо */
        .media-input-box { border: 2px dashed var(--border-color); padding: 20px; border-radius: 12px; text-align: center; color: var(--text-muted); background: var(--bg-main); transition: var(--transition-smooth); }
        .media-input-box:hover { border-color: var(--primary); color: var(--text-main); }
        
        .btn-submit { background: var(--primary); color: #000000; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; width: 100%; transition: var(--transition-smooth); margin-top: 10px; }
        .btn-submit:hover { background: var(--primary-hover); }

        @media (max-width: 992px) {
            .admin-container { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <a href="../client/index.html" class="logo">ZERO<span>HUB</span></a>
                <span style="font-size: 12px; background: var(--bg-hover); color: var(--primary); padding: 4px 8px; border-radius: 4px; margin-left: 10px; font-weight: bold;">АДМИН</span>
            </div>
            <div class="user-actions">
                <button id="logoutBtn" style="background: none; border: none; color: #ff4a4a; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;"><i class="fa-solid fa-right-from-bracket"></i> Баромад</button>
            </div>
        </div>
    </header>

    <main class="container admin-container">
        
        <aside class="admin-sidebar">
            <h3 style="font-size: 16px; color: var(--text-muted);">Мудирият</h3>
            <div class="sidebar-menu">
                <button class="active"><i class="fa-solid fa-plus"></i> Иловаи нав</button>
                <button onclick="alert('Рӯйхати маҳсулот дар қадами навбатӣ илова мешавад!')"><i class="fa-solid fa-list"></i> Ҳамаи маҳсулот</button>
            </div>
        </aside>

        <section class="admin-content">
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-box"></i></div>
                    <div>
                        <div class="stat-label">Ҳамаи Барномаҳо</div>
                        <div id="statTotalProducts" class="stat-num">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-eye"></i></div>
                    <div>
                        <div class="stat-label">Просмотрҳои умумӣ</div>
                        <div id="statTotalViews" class="stat-num">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-download"></i></div>
                    <div>
                        <div class="stat-label">Зеркашиҳо (Downloads)</div>
                        <div id="statTotalDownloads" class="stat-num">0</div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h2 style="font-size: 20px; margin-bottom: 24px;"><i class="fa-solid fa-circle-plus" style="color: var(--primary);"></i> Илова кардани Барнома ё Бозии Нав</h2>
                
                <form id="addProductForm">
                    <div class="form-grid">
                        
                        <div class="form-group">
                            <label>Номи Барнома (бо Руссӣ)</label>
                            <input type="text" id="prodTitleRu" placeholder="Масалан: ПАБГ Мобайл" required>
                        </div>
                        <div class="form-group">
                            <label>Номи Барнома (бо Англисӣ)</label>
                            <input type="text" id="prodTitleEn" placeholder="Масалан: PUBG Mobile" required>
                        </div>

                        <div class="form-group">
                            <label>Намуди Маҳсулот</label>
                            <select id="prodType" required>
                                <option value="apps">Барнома (App)</option>
                                <option value="games">Бозӣ (Game)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Категория</label>
                            <input type="text" id="prodCategory" placeholder="Масалан: action, tools, shooters" required>
                        </div>

                        <div class="form-group">
                            <label>Версияи Барнома</label>
                            <input type="text" id="prodVersion" placeholder="Масалан: 3.2.0" required>
                        </div>
                        <div class="form-group">
                            <label>Ҳаҷми Файл</label>
                            <input type="text" id="prodSize" placeholder="Масалан: 1.5 GB ё 45 MB" required>
                        </div>

                        <div class="form-group full-width">
                            <label>Пайванди ТГ барои зеркашӣ (Telegram Download Link)</label>
                            <input type="url" id="prodDownloadUrl" placeholder="https://t.me/канали_ту/123" required>
                        </div>

                        <div class="form-group">
                            <label>Пайванди Иконка (URL-и Акс)</label>
                            <input type="url" id="prodIconUrl" placeholder="https://site.com/icon.png" required>
                        </div>
                        <div class="form-group">
                            <label>Пайванди Видео-Трейлер (YouTube ё Файл)</label>
                            <input type="url" id="prodTrailerUrl" placeholder="https://youtube.com/watch?v=...">
                        </div>

                        <div class="form-group full-width">
                            <label>Пайванди Скриншотҳо (Вергул гузорӣ барои якчанд акс `,` )</label>
                            <textarea id="prodScreenshots" rows="2" placeholder="https://site.com/pic1.jpg, https://site.com/pic2.jpg"></textarea>
                        </div>

                        <div class="form-group full-width">
                            <label>Тавсифи Пурра (бо Руссӣ)</label>
                            <textarea id="prodDescRu" rows="4" placeholder="Описание барномаро инҷо навис..." required></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label>Тавсифи Пурра (бо Англисӣ)</label>
                            <textarea id="prodDescEn" rows="4" placeholder="Description барномаро инҷо naweb..." required></textarea>
                        </div>

                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--text-main); margin-top: 10px;">
                                <input type="checkbox" id="prodIsFeatured" style="width: 18px; height: 18px;"> Ба қисмати "Рекомендуемые" илова шавад?
                            </label>
                        </div>

                    </div>

                    <button type="submit" class="btn-submit">Худкор тавлид ва илова кардан</button>
                </form>
            </div>

        </section>
    </main>

    <script type="module" src="admin.js"></script>
</body>
</html>
