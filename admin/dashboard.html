<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROHUB - Панели Мудирият</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="style.js"></script>
</head>
<body>

    <header class="main-header">
        <a href="../client/index.html" class="logo">ZERO<span>HUB</span></a>
        <button id="logoutBtn" onclick="location.href='../client/index.html'"><i class="fa-solid fa-arrow-left"></i> Ба қафо</button>
    </header>

    <main class="admin-container">
        <aside class="admin-sidebar">
            <h3 style="font-size: 14px; color: var(--text-muted);">Идоракунӣ</h3>
            <div class="sidebar-menu">
                <button class="active"><i class="fa-solid fa-plus"></i> Иловаи барномаи нав</button>
            </div>
        </aside>

        <section class="admin-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-box"></i></div>
                    <div>
                        <div class="stat-label">Ҳамаи маҳсулот</div>
                        <div id="statTotalProducts" class="stat-num">0</div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h2 style="font-size: 18px; margin-bottom: 15px;"><i class="fa-solid fa-circle-plus" style="color: var(--neon-green);"></i> Маълумоти навро ворид кунед</h2>
                
                <form id="addProductForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Номи маҳсулот (бо тоҷикӣ/русӣ)</label>
                            <input type="text" id="nameRu" placeholder="Масалан: ПАБГ Мобайл" required>
                        </div>
                        <div class="form-group">
                            <label>Намуд</label>
                            <select id="appType" required>
                                <option value="game">Бозиҳо (Game)</option>
                                <option value="app">Барномаҳо (App)</option>
                                <option value="mod">Моддинг (Mod)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Name (English)</label>
                            <input type="text" id="nameEn" placeholder="PUBG Mobile" required>
                        </div>
                        <div class="form-group">
                            <label>Категория</label>
                            <input type="text" id="category" placeholder="Масалан: Action" required>
                        </div>
                        <div class="form-group">
                            <label>Версия</label>
                            <input type="text" id="version" placeholder="Масалан: 3.2.0" required>
                        </div>
                        <div class="form-group">
                            <label>Андоза (Size)</label>
                            <input type="text" id="size" placeholder="Масалан: 1.5 GB" required>
                        </div>
                        <div class="form-group full-width">
                            <label>Истинод барои зеркашӣ (Download Link)</label>
                            <input type="url" id="downloadLink" placeholder="https://..." required>
                        </div>
                        <div class="form-group full-width">
                            <label>Истиноди тасвир (Icon URL)</label>
                            <input type="url" id="iconUrl" placeholder="https://..." required>
                        </div>
                        <div class="form-group full-width">
                            <label>Тавсиф (бо тоҷикӣ/русӣ)</label>
                            <textarea id="descRu" rows="3" placeholder="Тавсиф..." required></textarea>
                        </div>
                        <div class="form-group">
                            <label style="cursor: pointer;">
                                <input type="checkbox" id="isRecommended"> Ба қисмати "Тавсияшуда" илова шавад?
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">Сабт дар база</button>
                </form>
            </div>
        </section>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
