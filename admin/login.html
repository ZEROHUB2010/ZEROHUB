<!DOCTYPE html>
<html lang="tg">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZEROHUB CMS Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#0f1115;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

}

body::before{

content:"";

position:absolute;

width:500px;

height:500px;

background:#2ecc71;

filter:blur(180px);

opacity:.18;

left:-120px;

top:-120px;

}

body::after{

content:"";

position:absolute;

width:450px;

height:450px;

background:#00c3ff;

filter:blur(180px);

opacity:.15;

right:-100px;

bottom:-100px;

}

.login-box{

position:relative;

z-index:2;

width:380px;

background:rgba(25,28,35,.92);

backdrop-filter:blur(15px);

padding:35px;

border-radius:22px;

border:1px solid rgba(255,255,255,.06);

box-shadow:0 20px 60px rgba(0,0,0,.45);

}

.logo{

font-size:34px;

font-weight:700;

text-align:center;

color:#34c759;

letter-spacing:1px;

}

.subtitle{

text-align:center;

margin-top:8px;

margin-bottom:35px;

color:#9ea7b3;

font-size:14px;

}
input{

width:100%;

padding:15px;

margin-bottom:18px;

background:#2b3038;

border:1px solid #3a404c;

border-radius:12px;

color:#fff;

font-size:15px;

transition:.3s;

}

input:focus{

outline:none;

border-color:#34c759;

box-shadow:0 0 10px rgba(52,199,89,.3);

}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#34c759;

color:#111;

font-size:16px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#2db14f;

transform:translateY(-2px);

}

#error{

margin-top:15px;

text-align:center;

color:#ff5d5d;

font-size:14px;

}

.footer{

margin-top:30px;

text-align:center;

color:#777;

font-size:13px;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

ZEROHUB

</div>

<div class="subtitle">

Admin Control Panel

</div>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">

ВОРИД ШУДАН

</button>

<div id="error"></div>

<div class="footer">

ZEROHUB © 2026

</div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyA_qDc-FbKjLGUF0YTJBQMiLE8sbw8mpGI",

authDomain:"zerohub2010.firebaseapp.com",

databaseURL:"https://zerohub2010-default-rtdb.firebaseio.com",

projectId:"zerohub2010",

storageBucket:"zerohub2010.firebasestorage.app",

messagingSenderId:"10761752021",

appId:"1:10761752021:web:891c5494e298f2c21e815c"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);
document.getElementById("loginBtn").addEventListener("click",async()=>{

const email=document.getElementById("email").value.trim();

const password=document.getElementById("password").value.trim();

const error=document.getElementById("error");

error.innerText="";

if(email===""||password===""){

error.innerText="Email ва Password-ро пур кунед.";

return;

}

try{

await signInWithEmailAndPassword(auth,email,password);

window.location.href="dashboard.html";

}

catch(e){

error.innerText="Email ё Password нодуруст аст.";

}

});
window.addEventListener("keydown",async(e)=>{

if(e.key!=="Enter") return;

document.getElementById("loginBtn").click();

});

const emailInput=document.getElementById("email");

const passwordInput=document.getElementById("password");

emailInput.focus();

emailInput.autocomplete="email";

passwordInput.autocomplete="current-password";

passwordInput.maxLength=100;

emailInput.maxLength=120;
if(localStorage.getItem("zerohub_login")=="true"){

window.location.href="dashboard.html";

}

window.addEventListener("load",()=>{

document.getElementById("email").value="";

document.getElementById("password").value="";

});

document.getElementById("email").addEventListener("input",()=>{

document.getElementById("error").innerText="";

});

document.getElementById("password").addEventListener("input",()=>{

document.getElementById("error").innerText="";

});
const loginBtn=document.getElementById("loginBtn");

loginBtn.disabled=false;

loginBtn.addEventListener("click",()=>{

loginBtn.innerText="Дар ҳоли воридшавӣ...";

loginBtn.disabled=true;

setTimeout(()=>{

loginBtn.disabled=false;

loginBtn.innerText="ВОРИД ШУДАН";

},3000);

});

document.getElementById("password").addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

document.getElementById("loginBtn").click();

}

});
const VERSION="ZEROHUB CMS v3.0";

console.log(VERSION);

window.addEventListener("online",()=>{

document.getElementById("error").innerText="";

});

window.addEventListener("offline",()=>{

document.getElementById("error").innerText="Интернет пайваст нест.";

});

window.addEventListener("pageshow",()=>{

document.getElementById("password").value="";

});

document.getElementById("email").spellcheck=false;

document.getElementById("password").spellcheck=false;
localStorage.removeItem("zerohub_temp");

window.addEventListener("beforeunload",()=>{

document.getElementById("password").value="";

});

document.addEventListener("contextmenu",(e)=>{

e.preventDefault();

});

document.addEventListener("dragstart",(e)=>{

e.preventDefault();

});

document.addEventListener("selectstart",(e)=>{

if(e.target.tagName!=="INPUT"){

e.preventDefault();

}

});
loginBtn.addEventListener("click",async()=>{

try{

localStorage.setItem("zerohub_login","true");

}catch(e){}

});

</script>

</body>

</html>
