<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROHUB - Вуруд ба Панели Админ</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-page { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .login-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 40px; border-radius: 24px; width: 100%; max-width: 420px; text-align: center; box-shadow: var(--shadow-premium); }
        .login-logo { font-size: 28px; font-weight: 800; margin-bottom: 10px; letter-spacing: 1px; }
        .login-logo span { color: var(--primary); }
        .login-subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }
        .btn-google { width: 100%; background: #ffffff; color: #000000; border: none; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: var(--transition-smooth); }
        .btn-google:hover { background: #e2e8f0; transform: translateY(-2px); }
        .error-msg { color: #ff4a4a; font-size: 14px; margin-top: 15px; display: none; background: rgba(255, 74, 74, 0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 74, 74, 0.2); }
    </style>
</head>
<body>

    <div class="container login-page">
        <div class="login-card">
            <div class="login-logo">ZERO<span>HUB</span></div>
            <div class="login-subtitle">Панели махфии мудирият. Танҳо барои админ.</div>
            
            <button id="googleLoginBtn" class="btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_認證圖標.svg" alt="Google" style="width: 20px; height: 20px;">
                Вуруд бо ҳисоби Google
            </button>

            <div id="errorBox" class="error-msg"></div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
