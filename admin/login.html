<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <title>ZEROHUB CMS - Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* Ин ҷо стилҳои ту мемонанд */
        body { background:#0f1115; display:flex; justify-content:center; align-items:center; height:100vh; }
        .login-box { width:360px; background:#1b1b1b; padding:20px; color:white; }
        input { width:100%; padding:14px; margin-bottom:10px; box-sizing:border-box; }
        button { width:100%; padding:15px; background:#3ddc84; border:none; cursor:pointer; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Воридшавӣ</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Парол">
        <button id="login-btn">ВУРУД</button>
    </div>

    <script src="admin.js"></script>
</body>
</html>
