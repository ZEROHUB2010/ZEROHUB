<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROHUB CMS - Маҳсулотҳо</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0f1115; color: white; display: flex; min-height: 100vh; }
        
        /* Sidebar (Меню) */
        .sidebar { width: 260px; background: #1b1f27; padding: 20px; display: flex; flex-direction: column; }
        .sidebar .logo { font-size: 24px; font-weight: bold; color: #3ddc84; text-align: center; margin-bottom: 30px; }
        .sidebar a { color: #ccc; text-decoration: none; padding: 12px 15px; margin-bottom: 8px; border-radius: 8px; display: block; font-size: 15px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #2b313d; color: #3ddc84; }
        .sidebar .logout-btn { margin-top: auto; background: #ff4a4a; color: white; text-align: center; cursor: pointer; padding: 12px; border-radius: 8px; }

        /* Main Content */
        .main-content { flex: 1; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #2b313d; padding-bottom: 15px; }
        .add-btn { background: #3ddc84; color: black; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Формаи иловакунии маҳсулот */
        .form-container { background: #1b1f27; padding: 25px; border-radius: 14px; margin-bottom: 30px; display: none; }
        .form-container h2 { margin-bottom: 20px; color: #3ddc84; font-size: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { color: #999; font-size: 14px; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { background: #2b313d; border: none; padding: 12px; border-radius: 8px; color: white; font-size: 15px; outline: none; }
        .form-group textarea { grid-column: span 2; height: 100px; resize: none; }
        .full-width { grid-column: span 2; }
        .save-btn { background: #3ddc84; color: black; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }
        
        /* Рӯйхати Маҳсулотҳо (Table) */
        .products-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1b1f27; border-radius: 14px; overflow: hidden; }
        .products-table th, .products-table td { padding: 15px; text-align: left; border-bottom: 1px solid #2b313d; }
        .products-table th { background: #2b313d; color: #3ddc84; font-size: 14px; }
        .products-table td { color: #ccc; font-size: 15px; }
        .actions-btn { background: #ff4a4a; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">ZEROHUB</div>
        <a href="dashboard.html">📊 Статистика</a>
        <a href="products.html" class="active">📦 Маҳсулотҳо</a>
        <a href="settings.html">⚙️ Танзимот</a>
        <a id="logout-btn" class="logout-btn">🚪 ХУРУҶ</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Идоракунии Маҳсулотҳо</h1>
            <button class="add-btn" id="toggle-form-btn">+ Иловаи нав</button>
        </div>

        <div class="form-container" id="product-form-block">
            <h2>Илова кардани Маҳсулоти Нав</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Номи маҳсулот</label>
                    <input type="text" id="p-title" placeholder="Масалан: GTA San Andreas Mod">
                </div>
                <div class="form-group">
                    <label>Версия</label>
                    <input type="text" id="p-version" placeholder="Масалан: v2.10">
                </div>
                <div class="form-group">
                    <label>Ҳаҷм (Size)</label>
                    <input type="text" id="p-size" placeholder="Масалан: 45 MB ё 1.2 GB">
                </div>
                <div class="form-group">
                    <label>Категория</label>
                    <select id="p-category">
                        <option value="Games">Бозиҳо (Games)</option>
                        <option value="Apps">Барномаҳо (Apps)</option>
                        <option value="Mods">Модҳо (Mods)</option>
                        <option value="Windows">Барои Компютер (PC)</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Линки Расм (Cloudinary URL)</label>
                    <input type="text" id="p-image" placeholder="https://res.cloudinary.com/...">
                </div>
                <div class="form-group full-width">
                    <label>Линки Боргирӣ (Download Link)</label>
                    <input type="text" id="p-download" placeholder="Линки файл аз Mega, Google Drive ва ғайра">
                </div>
                <div class="form-group full-width">
                    <label>Тавсиф (Description)</label>
                    <textarea id="p-desc" placeholder="Дар бораи маҳсулот маълумот нависед..."></textarea>
                </div>
            </div>
            <button class="save-btn" id="save-product-btn">САБТ КАРДАН БА БАЗА</button>
        </div>

        <h2>Рӯйхати Маҳсулотҳои Сайти Шумо</h2>
        <table class="products-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Расм</th>
                    <th>Номи Маҳсулот</th>
                    <th>Категория</th>
                    <th>Версия</th>
                    <th>Амал</th>
                </tr>
            </thead>
            <tbody id="products-list-tbody">
                </tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script src="admin.js"></script>

</body>
</html>
