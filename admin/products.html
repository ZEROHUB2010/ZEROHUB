<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ZEROHUB Products</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#0f1115;

color:#fff;

}

header{

position:sticky;

top:0;

z-index:100;

display:flex;

align-items:center;

justify-content:space-between;

padding:18px 20px;

background:#17191f;

border-bottom:1px solid #2a2d35;

}

.logo{

font-size:28px;

font-weight:700;

color:#35d06e;

}

.search{

width:220px;

padding:12px 15px;

background:#1f222a;

border:none;

border-radius:12px;

color:#fff;

outline:none;

}

.container{

padding:20px;

display:grid;

grid-template-columns:repeat(auto-fill,minmax(240px,1fr));

gap:20px;

}
.cards{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(260px,1fr));

gap:20px;

}

.card{

background:#17191f;

border:1px solid #2a2d35;

border-radius:18px;

overflow:hidden;

transition:.3s;

cursor:pointer;

}

.card:hover{

transform:translateY(-6px);

border-color:#35d06e;

}

.card img{

width:100%;

height:180px;

object-fit:cover;

}

.info{

padding:16px;

}

.title{

font-size:18px;

font-weight:600;

margin-bottom:8px;

}

.meta{

color:#9ea7b3;

font-size:14px;

margin-bottom:12px;

}

.download{

display:inline-block;

padding:10px 18px;

background:#35d06e;

color:#111;

text-decoration:none;

border-radius:10px;

font-weight:600;

}

</style>

</head>

<body>

<header>

<div class="logo">

ZEROHUB

</div>

<input

type="search"

class="search"

placeholder="Ҷустуҷӯи барнома...">

</header>

<div class="container"

id="productsContainer">
  </div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getDatabase,

ref,

onValue

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyA_qDc-FbKjLGUF0YTJBQMiLE8sbw8mpGI",

authDomain:"zerohub2010.firebaseapp.com",

databaseURL:"https://zerohub2010-default-rtdb.firebaseio.com",

projectId:"zerohub2010",

storageBucket:"zerohub2010.firebasestorage.app",

messagingSenderId:"10761752021",

appId:"1:10761752021:web:891c5494e298f2c21e815c"

};

const app=initializeApp(firebaseConfig);

const db=getDatabase(app);

const productsRef=ref(db,"products_v2");

const container=document.getElementById("productsContainer");

onValue(productsRef,(snapshot)=>{

const data=snapshot.val();

container.innerHTML="";

if(!data){

container.innerHTML="<h2>Ҳоло ягон маҳсулот нест.</h2>";

return;

}

Object.keys(data).reverse().forEach(key=>{

const p=data[key];

container.innerHTML+=`

<div class="card">

<img src="${p.image}" alt="">

<div class="info">

<div class="title">${p.title}</div>

<div class="meta">

${p.category} • ${p.version}<br>

${p.size}

</div>

<a class="download"

href="${p.link}"

target="_blank">

Download

</a>

</div>

</div>

`;

});

});
const search=document.querySelector(".search");

search.addEventListener("input",()=>{

const value=search.value.toLowerCase();

const cards=document.querySelectorAll(".card");

cards.forEach(card=>{

const text=card.innerText.toLowerCase();

card.style.display=text.includes(value)?"block":"none";

});

});

window.addEventListener("load",()=>{

document.body.style.opacity="0";

setTimeout(()=>{

document.body.style.transition=".4s";

document.body.style.opacity="1";

},100);

});

document.title="ZEROHUB Products";
window.addEventListener("online",()=>{

console.log("Internet Connected");

});

window.addEventListener("offline",()=>{

alert("Интернет қатъ шудааст!");

});

history.pushState(null,null,location.href);

window.onpopstate=function(){

history.go(1);

};

localStorage.setItem("zerohub_products","ready");
console.log("ZEROHUB Products Loaded");

</script>

</body>

</html>
