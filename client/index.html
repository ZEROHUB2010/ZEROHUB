<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROHUBSTORE - Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --neon-green: #00ff66; 
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 70px; overflow-x: hidden; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; position: sticky; top: 0; background-color: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); z-index: 100; }
        .logo { font-size: 20px; font-weight: 900; color: var(--neon-green); letter-spacing: 1px; }
        .lang-btn { background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 5px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .lang-btn:active { background: var(--neon-green); color: var(--bg-color); }
        
        .search-container { padding: 10px 20px; }
        .search-bar { width: 100%; background: var(--card-bg); border: 1px solid transparent; color: white; padding: 12px 15px; border-radius: 12px; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--neon-green); }
        
        .section-title { padding: 20px 20px 10px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .apps-scroll { display: flex; overflow-x: auto; padding: 0 20px 20px; gap: 15px; }
        .apps-scroll::-webkit-scrollbar { display: none; }
        
        .app-card { min-width: 130px; max-width: 130px; background: var(--card-bg); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; transition: 0.2s; }
        .app-card:active { opacity: 0.8; }
        
        .app-icon { width: 75px; height: 75px; border-radius: 18px; margin: 0 auto 10px; object-fit: cover; }
        .app-title { font-size: 14px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-size { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
        
        .install-btn { background: rgba(0, 255, 102, 0.1); color: var(--neon-green); border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; }
        .install-btn:active { background: var(--neon-green); color: var(--bg-color); }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(30, 41, 59, 0.98); padding: 12px 0 15px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; display: flex; justify-content: space-around; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 11px; gap: 5px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--neon-green); }
        
        /* Detail View Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 998;
            display: none;
        }

        .modal-overlay.active {
            display: block;
        }

        #app-detail-view { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: var(--bg-color); 
            z-index: 999; 
            overflow-y: auto; 
            padding-bottom: 20px;
        }

        #app-detail-view.active {
            display: block;
        }

        .detail-close-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .detail-close-btn:active {
            background: rgba(0, 0, 0, 0.7);
        }

        .detail-container {
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        /* Screenshots Carousel */
        .screenshots-section {
            margin: 20px 0;
        }

        .screenshots-carousel {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 10px 0;
            scroll-behavior: smooth;
        }

        .screenshots-carousel::-webkit-scrollbar {
            height: 6px;
        }

        .screenshots-carousel::-webkit-scrollbar-track {
            background: transparent;
        }

        .screenshots-carousel::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 102, 0.3);
            border-radius: 3px;
        }

        .screenshot {
            min-width: 130px;
            width: 130px;
            height: 230px;
            border-radius: 12px;
            object-fit: cover;
            cursor: pointer;
            transition: 0.2s;
        }

        .screenshot:active {
            transform: scale(0.95);
        }

        /* Video Section */
        .video-section {
            margin: 20px 0;
        }

        .video-player {
            width: 100%;
            height: 250px;
            border-radius: 12px;
            background: var(--card-bg);
        }

        /* App Header */
        .detail-header {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 20px;
            margin-top: 60px;
        }

        .detail-header img {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .detail-info {
            flex: 1;
        }

        .detail-info h2 {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .detail-info p {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .detail-size {
            font-size: 13px;
            color: var(--neon-green);
            font-weight: 600;
        }

        /* Download Section */
        .download-section {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .download-btn-main {
            flex: 1;
            background: linear-gradient(135deg, var(--neon-green), #00cc55);
            color: var(--bg-color);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .download-btn-main:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        /* Description Section */
        .description-section {
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .description-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .description-header h3 {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-main);
        }

        .expand-icon {
            font-size: 18px;
            color: var(--neon-green);
            transition: 0.3s;
        }

        .expand-icon.expanded {
            transform: rotate(180deg);
        }

        .description-text {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .description-text.expanded {
            -webkit-line-clamp: unset;
            white-space: normal;
            margin-top: 10px;
        }

        .empty-message { 
            width: 100%; 
            text-align: center; 
            color: var(--text-muted); 
            font-size: 14px; 
            padding: 20px 0; 
        }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="header">
            <div class="logo">ZEROHUBSTORE</div>
            <button class="lang-btn" id="langToggle">RU / EN</button>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Поиск игр...">
        </div>
        <div class="section-title">
            <span id="title-recommended">Игры</span>
        </div>
        <div id="apps-container" class="apps-scroll">
            <div class="empty-message">Загрузка...</div>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay"></div>

    <!-- App Detail View -->
    <div id="app-detail-view">
        <button class="detail-close-btn" onclick="closeDetail()">
            <i class="fas fa-times"></i>
        </button>
        <div class="detail-container" id="detail-content"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav" id="bottomNav"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDB_-vXWoIr5eriBNPKODNA5AYp-jDAUHU",
            authDomain: "zerohubstore-a2983.firebaseapp.com",
            databaseURL: "https://zerohubstore-a2983-default-rtdb.firebaseio.com",
            projectId: "zerohubstore-a2983",
            storageBucket: "zerohubstore-a2983.firebasestorage.app",
            messagingSenderId: "527606629633",
            appId: "1:527606629633:web:287254f0046715c5444700",
            measurementId: "G-S619Y9E16P"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allApps = [];
        let currentLang = 'ru';
        let currentCategory = 'game';

        function loadData() {
            db.ref('apps').on('value', (snapshot) => {
                allApps = [];
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => allApps.push(data[key]));
                }
                filterCategory(currentCategory);
            });
        }

        function filterCategory(category) {
            currentCategory = category.toLowerCase();
            const filtered = allApps.filter(app => app.type && app.type.toLowerCase() === category);
            renderApps(filtered);
            updateTitle(category);
        }

        function updateTitle(cat) {
            const titleSpan = document.getElementById('title-recommended');
            if (currentLang === 'ru') {
                titleSpan.innerText = cat === 'game' ? 'Игры' : cat === 'app' ? 'Программы' : 'Модификации';
            } else {
                titleSpan.innerText = cat === 'game' ? 'Games' : cat === 'app' ? 'Apps' : 'Mods';
            }
        }

        function openDetail(appIndex) {
            const app = allApps[appIndex];
            if (!app) return;

            const content = document.getElementById('detail-content');
            const appName = currentLang === 'ru' ? (app.nameRu || 'Без названия') : (app.nameEn || 'No Title');
            
            // Build screenshots HTML
            let screenshotsHtml = '';
            if (app.screenshots) {
                let screenshotArray = [];
                if (typeof app.screenshots === 'string') {
                    screenshotArray = app.screenshots.split(',').map(s => s.trim()).filter(s => s);
                } else if (Array.isArray(app.screenshots)) {
                    screenshotArray = app.screenshots;
                }
                
                if (screenshotArray.length > 0) {
                    screenshotsHtml = `
                        <div class="screenshots-section">
                            <div class="screenshots-carousel" id="screenshotsCarousel">
                                ${screenshotArray.map(screenshot => `
                                    <img src="${screenshot}" class="screenshot" onerror="this.style.display='none'">
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            // Build video HTML
            let videoHtml = '';
            if (app.trailerUrl) {
                videoHtml = `
                    <div class="video-section">
                        <video class="video-player" controls>
                            <source src="${app.trailerUrl}" type="video/mp4">
                        </video>
                    </div>
                `;
            }

            const description = currentLang === 'ru' ? (app.descRu || '') : (app.descEn || '');
            const downloadText = currentLang === 'ru' ? 'Скачать' : 'Download';
            const descTitle = currentLang === 'ru' ? 'Описание' : 'Description';

            content.innerHTML = `
                <div class="detail-header">
                    <img src="${app.iconUrl || 'https://placehold.co/100'}" onerror="this.src='https://placehold.co/100'">
                    <div class="detail-info">
                        <h2>${appName}</h2>
                        <p>${app.developer || 'Unknown Developer'}</p>
                        <div class="detail-size">📦 ${app.size || '—'}</div>
                    </div>
                </div>

                ${screenshotsHtml}

                ${videoHtml}

                <div class="download-section">
                    <button class="download-btn-main" onclick="window.open('${app.downloadLink}', '_blank')">
                        <i class="fas fa-download"></i> ${downloadText}
                    </button>
                </div>

                <div class="description-section">
                    <div class="description-header" onclick="toggleDescription(this)">
                        <h3>${descTitle}</h3>
                        <i class="fas fa-chevron-down expand-icon"></i>
                    </div>
                    <div class="description-text">${description}</div>
                </div>
            `;

            document.getElementById('app-detail-view').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() {
            document.getElementById('app-detail-view').classList.remove('active');
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        function toggleDescription(header) {
            const icon = header.querySelector('.expand-icon');
            const text = header.nextElementSibling;
            
            icon.classList.toggle('expanded');
            text.classList.toggle('expanded');
        }

        function renderApps(appsToRender) {
            const container = document.getElementById('apps-container');
            if (appsToRender.length === 0) {
                container.innerHTML = `<div class="empty-message">${currentLang === 'ru' ? 'Ничего не найдено' : 'Nothing found'}</div>`;
                return;
            }

            container.innerHTML = appsToRender.map((app, index) => {
                const title = currentLang === 'ru' ? (app.nameRu || 'Без названия') : (app.nameEn || 'No Title');
                const allAppsIndex = allApps.indexOf(app);
                
                return `
                    <div class="app-card" onclick="openDetail(${allAppsIndex})">
                        <img src="${app.iconUrl || 'https://placehold.co/100'}" class="app-icon" onerror="this.src='https://placehold.co/100'">
                        <div class="app-title">${title}</div>
                        <div class="app-size">${app.size || '—'}</div>
                        <button class="install-btn" onclick="event.stopPropagation(); window.open('${app.downloadLink}', '_blank')">
                            <i class="fas fa-download"></i> ${currentLang === 'ru' ? 'Скачать' : 'Download'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        function setupBottomNav() {
            const nav = document.getElementById('bottomNav');
            const items = [
                { id: 'game', icon: 'fa-gamepad', textRu: 'Игры', textEn: 'Games' },
                { id: 'app', icon: 'fa-mobile-alt', textRu: 'Прилож.', textEn: 'Apps' },
                { id: 'mod', icon: 'fa-tools', textRu: 'Моддинг', textEn: 'Mods' }
            ];

            nav.innerHTML = items.map(item => `
                <div class="nav-item ${item.id === 'game' ? 'active' : ''}" onclick="filterCategory('${item.id}')">
                    <i class="fas ${item.icon}"></i>
                    <span class="nav-text">${currentLang === 'ru' ? item.textRu : item.textEn}</span>
                </div>
            `).join('');
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            document.getElementById('langToggle').innerText = currentLang === 'ru' ? 'RU / EN' : 'EN / RU';
            document.getElementById('searchInput').placeholder = currentLang === 'ru' ? 'Поиск игр...' : 'Search games...';
            setupBottomNav();
            filterCategory(currentCategory);
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (!query) {
                filterCategory(currentCategory);
                return;
            }

            const filtered = allApps.filter(app =>
                (app.nameRu && app.nameRu.toLowerCase().includes(query)) ||
                (app.nameEn && app.nameEn.toLowerCase().includes(query))
            );

            const titleSpan = document.getElementById('title-recommended');
            titleSpan.innerText = currentLang === 'ru' ? 'Результаты поиска' : 'Search Results';
            renderApps(filtered);
        });

        document.getElementById('modalOverlay').addEventListener('click', closeDetail);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeDetail();
        });

        setupBottomNav();
        loadData();
    </script>
</body>
</html>
