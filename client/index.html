<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROHUBSTORE - Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --neon-green: #00ff66; 
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 70px;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            background-color: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 900; color: var(--neon-green); letter-spacing: 1px; }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .lang-btn:active { background: var(--neon-green); color: var(--bg-color); }

        .search-container { padding: 10px 20px; }
        .search-bar {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid transparent;
            color: white;
            padding: 12px 15px;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--neon-green); }

        .section-title { 
            padding: 20px 20px 10px; 
            font-size: 18px; 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .apps-scroll {
            display: flex;
            overflow-x: auto;
            padding: 0 20px 20px;
            gap: 15px;
        }
        .apps-scroll::-webkit-scrollbar { display: none; }

        .app-card {
            min-width: 130px;
            max-width: 130px;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.2s;
            cursor: pointer;
        }
        .app-icon {
            width: 75px;
            height: 75px;
            border-radius: 18px;
            margin: 0 auto 10px;
            object-fit: cover;
        }
        .app-title { font-size: 14px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-size { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }

        .install-btn {
            background: rgba(0, 255, 102, 0.1);
            color: var(--neon-green);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }
        .install-btn:active { background: var(--neon-green); color: var(--bg-color); }

        .empty-message { width: 100%; text-align: center; color: var(--text-muted); font-size: 14px; padding: 20px 0; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(30, 41, 59, 0.98);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 11px;
            gap: 5px;
            width: 20%;
            cursor: pointer;
        }
        .nav-item i { font-size: 20px; transition: 0.3s; }
        .nav-item.active { color: var(--neon-green); }

        /* App Details Modal */
        .app-details-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(100%);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-details-modal.active {
            display: block;
        }

        .modal-content {
            background: var(--bg-color);
            border-radius: 20px 20px 0 0;
            margin-top: auto;
            padding: 0;
            max-width: 100%;
            animation: modalSlideUp 0.3s ease-out;
        }

        @keyframes modalSlideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-container {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .video-player {
            width: 100%;
            height: 250px;
            background: var(--card-bg);
            border-radius: 0;
        }

        .screenshots-carousel {
            position: relative;
            width: 100%;
            padding-top: 20px;
            padding-bottom: 10px;
        }

        .screenshots-scroll {
            display: flex;
            overflow-x: auto;
            padding: 0 15px;
            gap: 10px;
            scroll-behavior: smooth;
        }
        .screenshots-scroll::-webkit-scrollbar { display: none; }

        .screenshot {
            min-width: 100px;
            max-width: 100px;
            height: 180px;
            border-radius: 10px;
            object-fit: cover;
            cursor: pointer;
            transition: 0.2s;
        }
        .screenshot:active { transform: scale(0.95); }

        .app-info {
            padding: 20px;
        }

        .app-header {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .app-icon-large {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            object-fit: cover;
        }

        .app-info-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .app-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .app-developer {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .app-meta {
            display: flex;
            gap: 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .download-btn {
            background: var(--neon-green);
            color: var(--bg-color);
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            transition: 0.2s;
        }
        .download-btn:active { opacity: 0.8; }

        .description-section {
            margin-bottom: 15px;
        }

        .description-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .description-text {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .description-text.expanded {
            -webkit-line-clamp: unset;
            white-space: normal;
        }

        .expand-btn {
            background: transparent;
            border: none;
            color: var(--neon-green);
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .expand-btn i {
            transition: 0.3s;
        }

        .expand-btn.expanded i {
            transform: rotate(180deg);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            display: none;
        }

        .modal-overlay.active {
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">ZEROHUBSTORE</div>
        <button class="lang-btn" id="langToggle">RU / EN</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-bar" placeholder="Поиск игр и приложений...">
    </div>

    <div class="section-title">
        <span id="title-recommended">Игры</span> 
        <i class="fas fa-arrow-right" style="font-size: 14px;"></i>
    </div>
    
    <div id="apps-container" class="apps-scroll">
        <div class="empty-message">Загрузка данных... ⏳</div>
    </div>

    <!-- App Details Modal -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="app-details-modal" id="appDetailsModal">
        <button class="modal-close-btn" onclick="closeAppDetails()">
            <i class="fas fa-times"></i>
        </button>
        <div class="modal-content">
            <div class="media-container">
                <video id="trailerVideo" class="video-player" controls>
                    <source src="" type="video/mp4">
                </video>
                <div class="screenshots-carousel">
                    <div class="screenshots-scroll" id="screenshotsScroll"></div>
                </div>
            </div>

            <div class="app-info">
                <div class="app-header">
                    <img id="modalAppIcon" src="" class="app-icon-large" onerror="this.src='https://placehold.co/100'">
                    <div class="app-info-text">
                        <div class="app-name" id="modalAppName">App Name</div>
                        <div class="app-developer" id="modalAppDeveloper">Developer</div>
                        <div class="app-meta">
                            <span id="modalAppSize">—</span>
                        </div>
                    </div>
                </div>

                <button class="download-btn" id="modalDownloadBtn">
                    <i class="fas fa-download"></i> Скачать
                </button>

                <div class="description-section">
                    <div class="description-title">
                        <span id="descTitle">Описание</span>
                        <button class="expand-btn" id="expandBtn" onclick="toggleDescription()">
                            <i class="fas fa-chevron-down"></i>
                        </button>
                    </div>
                    <div class="description-text" id="modalDescription">Description text</div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="filterCategory('game')">
            <i class="fas fa-gamepad"></i>
            <span id="nav-games">Игры</span>
        </div>
        <div class="nav-item" onclick="filterCategory('app')">
            <i class="fas fa-mobile-alt"></i>
            <span id="nav-apps">Прилож.</span>
        </div>
        <div class="nav-item" onclick="document.getElementById('searchInput').focus()">
            <i class="fas fa-search"></i>
            <span id="nav-search">Поиск</span>
        </div>
        <div class="nav-item" onclick="filterCategory('mod')">
            <i class="fas fa-tools"></i>
            <span id="nav-mods">Моддинг</span>
        </div>
        <a href="admin/index.html" class="nav-item">
            <i class="fas fa-user-shield"></i>
            <span id="nav-profile">Профиль</span>
        </a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDB_-vXWoIr5eriBNPKODNA5AYp-jDAUHU",
            authDomain: "zerohubstore-a2983.firebaseapp.com",
            databaseURL: "https://zerohubstore-a2983-default-rtdb.firebaseio.com",
            projectId: "zerohubstore-a2983",
            storageBucket: "zerohubstore-a2983.firebasestorage.app",
            messagingSenderId: "527606629633",
            appId: "1:527606629633:web:287254f0046715c5444700",
            measurementId: "G-S619Y9E16P"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allApps = [];
        let currentCategory = 'game';
        let currentLang = 'ru';
        let currentApp = null;

        function loadData() {
            db.ref('apps').on('value', (snapshot) => {
                allApps = [];
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => allApps.push(data[key]));
                }
                const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
                searchQuery ? executeSearch(searchQuery) : filterCategory(currentCategory);
            });
        }

        function filterCategory(category) {
            currentCategory = category.toLowerCase();
            const navItems = document.querySelectorAll('.bottom-nav .nav-item');
            navItems.forEach(item => item.classList.remove('active'));
            const indexMap = { 'game': 0, 'app': 1, 'mod': 3 };
            if (navItems[indexMap[currentCategory]]) navItems[indexMap[currentCategory]].classList.add('active');

            document.getElementById('searchInput').value = '';
            const filtered = allApps.filter(item => item.type && item.type.toLowerCase() === currentCategory);
            updateTitle(currentCategory);
            renderApps(filtered);
        }

        function updateTitle(cat) {
            const titleSpan = document.getElementById('title-recommended');
            if (currentLang === 'ru') {
                titleSpan.innerText = cat === 'game' ? 'Игры' : cat === 'app' ? 'Программы' : 'Модификации';
            } else {
                titleSpan.innerText = cat === 'game' ? 'Games' : cat === 'app' ? 'Apps' : 'Mods';
            }
        }

        function renderApps(appsToRender) {
            const container = document.getElementById('apps-container');
            if (appsToRender.length === 0) {
                container.innerHTML = `<div class="empty-message">${currentLang === 'ru' ? 'Ничего не найдено' : 'Nothing found'}</div>`;
                return;
            }
            container.innerHTML = appsToRender.map(app => `
                <div class="app-card" onclick="openAppDetails(${JSON.stringify(app).replace(/"/g, '&quot;')})">
                    <img src="${app.iconUrl || 'https://placehold.co/100'}" class="app-icon" onerror="this.src='https://placehold.co/100'">
                    <div class="app-title">${currentLang === 'ru' ? (app.nameRu || 'Без названия') : (app.nameEn || 'No Title')}</div>
                    <div class="app-size">${app.size || '—'}</div>
                    <button class="install-btn" onclick="event.stopPropagation(); window.open('${app.downloadLink}', '_blank')">
                        <i class="fas fa-download"></i> ${currentLang === 'ru' ? 'Скачать' : 'Download'}
                    </button>
                </div>
            `).join('');
        }

        function executeSearch(query) {
            const filtered = allApps.filter(app => 
                (app.nameRu && app.nameRu.toLowerCase().includes(query)) || 
                (app.nameEn && app.nameEn.toLowerCase().includes(query))
            );
            document.getElementById('title-recommended').innerText = currentLang === 'ru' ? 'Результаты поиска' : 'Search Results';
            renderApps(filtered);
        }

        function openAppDetails(app) {
            currentApp = app;
            const modal = document.getElementById('appDetailsModal');
            const overlay = document.getElementById('modalOverlay');

            // Set app info
            document.getElementById('modalAppName').innerText = currentLang === 'ru' ? (app.nameRu || 'Без названия') : (app.nameEn || 'No Title');
            document.getElementById('modalAppDeveloper').innerText = app.developer || 'Unknown Developer';
            document.getElementById('modalAppIcon').src = app.iconUrl || 'https://placehold.co/100';
            document.getElementById('modalAppSize').innerText = app.size || '—';
            document.getElementById('modalDescription').innerText = currentLang === 'ru' ? (app.descriptionRu || '') : (app.descriptionEn || '');
            document.getElementById('descTitle').innerText = currentLang === 'ru' ? 'Описание' : 'Description';
            document.getElementById('expandBtn').innerText = currentLang === 'ru' ? '▼' : '▼';

            // Set trailer video
            const trailerVideo = document.getElementById('trailerVideo');
            trailerVideo.src = app.trailerUrl || '';

            // Set screenshots
            const screenshotsContainer = document.getElementById('screenshotsScroll');
            screenshotsContainer.innerHTML = '';
            if (app.screenshots && Array.isArray(app.screenshots)) {
                app.screenshots.forEach(screenshot => {
                    const img = document.createElement('img');
                    img.src = screenshot;
                    img.class = 'screenshot';
                    img.onerror = () => img.style.display = 'none';
                    screenshotsContainer.appendChild(img);
                });
            }

            // Set download button
            const downloadBtn = document.getElementById('modalDownloadBtn');
            downloadBtn.innerText = currentLang === 'ru' ? '⬇ Скачать' : '⬇ Download';
            downloadBtn.onclick = () => window.open(app.downloadLink, '_blank');

            // Reset description state
            document.getElementById('modalDescription').classList.remove('expanded');
            document.getElementById('expandBtn').classList.remove('expanded');

            // Show modal
            modal.classList.add('active');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeAppDetails() {
            const modal = document.getElementById('appDetailsModal');
            const overlay = document.getElementById('modalOverlay');
            modal.classList.remove('active');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            document.getElementById('modalDescription').classList.remove('expanded');
            document.getElementById('expandBtn').classList.remove('expanded');
        }

        function toggleDescription() {
            const descText = document.getElementById('modalDescription');
            const expandBtn = document.getElementById('expandBtn');
            
            descText.classList.toggle('expanded');
            expandBtn.classList.toggle('expanded');
        }

        // Close modal when clicking overlay
        document.getElementById('modalOverlay').addEventListener('click', closeAppDetails);

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeAppDetails();
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase().trim();
            q ? executeSearch(q) : filterCategory(currentCategory);
        });

        document.getElementById('langToggle').addEventListener('click', (e) => {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            e.target.innerText = currentLang === 'ru' ? 'RU / EN' : 'EN / RU';
            document.getElementById('nav-games').innerText = currentLang === 'ru' ? 'Игры' : 'Games';
            document.getElementById('nav-apps').innerText = currentLang === 'ru' ? 'Прилож.' : 'Apps';
            document.getElementById('nav-search').innerText = currentLang === 'ru' ? 'Поиск' : 'Search';
            document.getElementById('nav-mods').innerText = currentLang === 'ru' ? 'Моддинг' : 'Mods';
            document.getElementById('nav-profile').innerText = currentLang === 'ru' ? 'Профиль' : 'Profile';
            
            // Update modal if open
            if (currentApp && document.getElementById('appDetailsModal').classList.contains('active')) {
                document.getElementById('modalAppName').innerText = currentLang === 'ru' ? (currentApp.nameRu || 'Без названия') : (currentApp.nameEn || 'No Title');
                document.getElementById('modalDescription').innerText = currentLang === 'ru' ? (currentApp.descriptionRu || '') : (currentApp.descriptionEn || '');
                document.getElementById('descTitle').innerText = currentLang === 'ru' ? 'Описание' : 'Description';
                document.getElementById('modalDownloadBtn').innerText = currentLang === 'ru' ? '⬇ Скачать' : '⬇ Download';
            }

            const q = document.getElementById('searchInput').value.trim();
            q ? executeSearch(q.toLowerCase()) : filterCategory(currentCategory);
        });

        loadData();
    </script>
</body>
</html>
