<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROHUBSTORE - Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --neon-green: #00ff66; 
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 70px;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            background-color: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 900; color: var(--neon-green); letter-spacing: 1px; }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .lang-btn:active { background: var(--neon-green); color: var(--bg-color); }

        .search-container { padding: 10px 20px; }
        .search-bar {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid transparent;
            color: white;
            padding: 12px 15px;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--neon-green); }

        .section-title { 
            padding: 20px 20px 10px; 
            font-size: 18px; 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .apps-scroll {
            display: flex;
            overflow-x: auto;
            padding: 0 20px 20px;
            gap: 15px;
        }
        .apps-scroll::-webkit-scrollbar { display: none; }

        .app-card {
            min-width: 130px;
            max-width: 130px;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.2s;
            cursor: pointer;
        }
        .app-icon {
            width: 75px;
            height: 75px;
            border-radius: 18px;
            margin: 0 auto 10px;
            object-fit: cover;
        }
        .app-title { font-size: 14px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-size { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }

        .install-btn {
            background: rgba(0, 255, 102, 0.1);
            color: var(--neon-green);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }
        .install-btn:active { background: var(--neon-green); color: var(--bg-color); }

        .empty-message { width: 100%; text-align: center; color: var(--text-muted); font-size: 14px; padding: 20px 0; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(30, 41, 59, 0.98);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 11px;
            gap: 5px;
            width: 20%;
            cursor: pointer;
        }
        .nav-item i { font-size: 20px; transition: 0.3s; }
        .nav-item.active { color: var(--neon-green); }

        /* App Detail Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            overflow-y: auto;
            padding-bottom: 70px;
        }

        .modal-overlay.active {
            display: block;
        }

        .modal-content {
            background: var(--bg-color);
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 0;
            position: relative;
        }

        .modal-close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 24px;
            cursor: pointer;
            z-index: 201;
        }

        .modal-app-icon {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            object-fit: cover;
            margin: 0 auto 15px;
            display: block;
        }

        .modal-app-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .modal-app-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .modal-app-developer {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .modal-app-tags {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .modal-app-stats {
            display: flex;
            justify-content: space-around;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--neon-green);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .modal-trailer {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            margin-bottom: 20px;
            background: var(--card-bg);
            object-fit: cover;
        }

        .screenshots-container {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }
        .screenshots-container::-webkit-scrollbar { height: 4px; }
        .screenshots-container::-webkit-scrollbar-track { background: var(--card-bg); border-radius: 10px; }
        .screenshots-container::-webkit-scrollbar-thumb { background: var(--neon-green); border-radius: 10px; }

        .screenshot {
            min-width: 120px;
            height: 180px;
            border-radius: 10px;
            object-fit: cover;
        }

        .description-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .description-title {
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .description-title i {
            transition: 0.3s;
        }

        .description-title.expanded i {
            transform: rotate(90deg);
        }

        .description-text {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s;
        }

        .description-text.expanded {
            max-height: 500px;
        }

        .description-preview {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            display: block;
            margin-bottom: 10px;
        }

        .modal-download-btn {
            background: rgba(0, 255, 102, 0.1);
            color: var(--neon-green);
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-download-btn:active {
            background: var(--neon-green);
            color: var(--bg-color);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">ZEROHUBSTORE</div>
        <button class="lang-btn" id="langToggle">RU / EN</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-bar" placeholder="Поиск игр и приложений...">
    </div>

    <div class="section-title">
        <span id="title-recommended">Игры</span> 
        <i class="fas fa-arrow-right" style="font-size: 14px;"></i>
    </div>
    
    <div id="apps-container" class="apps-scroll">
        <div class="empty-message">Загрузка данных... ⏳</div>
    </div>

    <!-- App Detail Modal -->
    <div id="appModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-btn" onclick="closeAppModal()">✕</button>
            
            <img id="modalIcon" class="modal-app-icon" src="" alt="">
            
            <div class="modal-app-info">
                <div class="modal-app-title" id="modalTitle"></div>
                <div class="modal-app-developer" id="modalDeveloper"></div>
                <div class="modal-app-tags" id="modalTags"></div>
            </div>

            <div class="modal-app-stats">
                <div class="stat-item">
                    <div class="stat-value" id="modalRating">—</div>
                    <div class="stat-label" id="modalReviews">—</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="modalAge">—</div>
                    <div class="stat-label" id="modalAgeLabel">Age</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="modalSize">—</div>
                    <div class="stat-label" id="modalSizeLabel">Size</div>
                </div>
            </div>

            <video id="modalTrailer" class="modal-trailer" controls></video>

            <div class="screenshots-container" id="screenshotsContainer"></div>

            <div class="description-section">
                <div class="description-title" onclick="toggleDescription(event)">
                    <span id="descriptionTitleText">Description</span>
                    <i class="fas fa-chevron-right"></i>
                </div>
                <div class="description-preview" id="descriptionPreview"></div>
                <div class="description-text" id="descriptionFull"></div>
            </div>

            <button class="modal-download-btn" id="modalDownloadBtn" onclick="downloadApp()">
                <i class="fas fa-download"></i> <span id="downloadBtnText">Download</span>
            </button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="filterCategory('game')">
            <i class="fas fa-gamepad"></i>
            <span id="nav-games">Игры</span>
        </div>
        <div class="nav-item" onclick="filterCategory('app')">
            <i class="fas fa-mobile-alt"></i>
            <span id="nav-apps">Прилож.</span>
        </div>
        <div class="nav-item" onclick="document.getElementById('searchInput').focus()">
            <i class="fas fa-search"></i>
            <span id="nav-search">Поиск</span>
        </div>
        <div class="nav-item" onclick="filterCategory('mod')">
            <i class="fas fa-tools"></i>
            <span id="nav-mods">Моддинг</span>
        </div>
        <a href="admin/index.html" class="nav-item">
            <i class="fas fa-user-shield"></i>
            <span id="nav-profile">Профиль</span>
        </a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDB_-vXWoIr5eriBNPKODNA5AYp-jDAUHU",
            authDomain: "zerohubstore-a2983.firebaseapp.com",
            databaseURL: "https://zerohubstore-a2983-default-rtdb.firebaseio.com",
            projectId: "zerohubstore-a2983",
            storageBucket: "zerohubstore-a2983.firebasestorage.app",
            messagingSenderId: "527606629633",
            appId: "1:527606629633:web:287254f0046715c5444700",
            measurementId: "G-S619Y9E16P"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allApps = [];
        let currentCategory = 'game';
        let currentLang = 'ru';
        let selectedApp = null;

        function loadData() {
            db.ref('apps').on('value', (snapshot) => {
                allApps = [];
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => allApps.push(data[key]));
                }
                const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
                searchQuery ? executeSearch(searchQuery) : filterCategory(currentCategory);
            });
        }

        function filterCategory(category) {
            currentCategory = category.toLowerCase();
            const navItems = document.querySelectorAll('.bottom-nav .nav-item');
            navItems.forEach(item => item.classList.remove('active'));
            const indexMap = { 'game': 0, 'app': 1, 'mod': 3 };
            if (navItems[indexMap[currentCategory]]) navItems[indexMap[currentCategory]].classList.add('active');

            document.getElementById('searchInput').value = '';
            const filtered = allApps.filter(item => item.type && item.type.toLowerCase() === currentCategory);
            updateTitle(currentCategory);
            renderApps(filtered);
        }

        function updateTitle(cat) {
            const titleSpan = document.getElementById('title-recommended');
            if (currentLang === 'ru') {
                titleSpan.innerText = cat === 'game' ? 'Игры' : cat === 'app' ? 'Программы' : 'Модификации';
            } else {
                titleSpan.innerText = cat === 'game' ? 'Games' : cat === 'app' ? 'Apps' : 'Mods';
            }
        }

        function renderApps(appsToRender) {
            const container = document.getElementById('apps-container');
            if (appsToRender.length === 0) {
                container.innerHTML = `<div class="empty-message">${currentLang === 'ru' ? 'Ничего не найдено' : 'Nothing found'}</div>`;
                return;
            }
            container.innerHTML = appsToRender.map(app => `
                <div class="app-card" onclick="openAppModal(this)">
                    <img src="${app.iconUrl || 'https://placehold.co/100'}" class="app-icon" onerror="this.src='https://placehold.co/100'">
                    <div class="app-title">${currentLang === 'ru' ? (app.nameRu || 'Без названия') : (app.nameEn || 'No Title')}</div>
                    <div class="app-size">${app.size || '—'}</div>
                    <button class="install-btn" onclick="event.stopPropagation(); window.open('${app.downloadLink}', '_blank')">
                        <i class="fas fa-download"></i> ${currentLang === 'ru' ? 'Скачать' : 'Download'}
                    </button>
                </div>
            `).join('');
        }

        function executeSearch(query) {
            const filtered = allApps.filter(app => 
                (app.nameRu && app.nameRu.toLowerCase().includes(query)) || 
                (app.nameEn && app.nameEn.toLowerCase().includes(query))
            );
            document.getElementById('title-recommended').innerText = currentLang === 'ru' ? 'Результаты поиска' : 'Search Results';
            renderApps(filtered);
        }

        function openAppModal(element) {
            const appCard = element.closest('.app-card');
            const appIndex = Array.from(document.querySelectorAll('.app-card')).indexOf(appCard);
            const container = document.getElementById('apps-container');
            const cards = container.querySelectorAll('.app-card');
            let appData = null;

            for (let app of allApps) {
                const appName = currentLang === 'ru' ? app.nameRu : app.nameEn;
                if (appCard.querySelector('.app-title').innerText === appName) {
                    appData = app;
                    break;
                }
            }

            if (!appData) return;

            selectedApp = appData;

            // Fill modal
            document.getElementById('modalIcon').src = appData.iconUrl || 'https://placehold.co/100';
            document.getElementById('modalTitle').innerText = currentLang === 'ru' ? (appData.nameRu || 'Без названия') : (appData.nameEn || 'No Title');
            document.getElementById('modalDeveloper').innerText = appData.developer || '—';
            
            const tagsText = [appData.hasAds ? (currentLang === 'ru' ? 'Есть реклама' : 'Has Ads') : '', appData.hasPaidContent ? (currentLang === 'ru' ? 'Есть платный контент' : 'Has Paid Content') : ''].filter(Boolean).join(' • ');
            document.getElementById('modalTags').innerText = tagsText || '—';

            // Stats
            const rating = appData.rating ? `${appData.rating}★` : '—';
            const reviews = appData.reviews ? `${appData.reviews} ${currentLang === 'ru' ? 'отзывов' : 'reviews'}` : '—';
            document.getElementById('modalRating').innerText = rating;
            document.getElementById('modalReviews').innerText = reviews;
            document.getElementById('modalAge').innerText = appData.ageRating || '—';
            document.getElementById('modalSize').innerText = appData.size || '—';

            // Trailer
            const trailerVideo = document.getElementById('modalTrailer');
            if (appData.trailerUrl) {
                trailerVideo.src = appData.trailerUrl;
                trailerVideo.style.display = 'block';
            } else {
                trailerVideo.style.display = 'none';
            }

            // Screenshots
            const screenshotsContainer = document.getElementById('screenshotsContainer');
            if (appData.screenshots && appData.screenshots.length > 0) {
                screenshotsContainer.innerHTML = appData.screenshots.map(screenshot => `
                    <img src="${screenshot}" class="screenshot" onerror="this.src='https://placehold.co/120x180'">
                `).join('');
            } else {
                screenshotsContainer.innerHTML = '';
            }

            // Description
            const description = currentLang === 'ru' ? (appData.descriptionRu || appData.description || '') : (appData.descriptionEn || appData.description || '');
            const preview = description.split('\n')[0] || description.substring(0, 100);
            document.getElementById('descriptionPreview').innerText = preview + (description.length > preview.length ? '...' : '');
            document.getElementById('descriptionFull').innerText = description;
            document.getElementById('descriptionTitleText').innerText = currentLang === 'ru' ? 'Описание' : 'Description';

            // Reset description expansion
            const descTitle = document.querySelector('.description-title');
            descTitle.classList.remove('expanded');
            document.getElementById('descriptionFull').classList.remove('expanded');

            // Download button
            document.getElementById('downloadBtnText').innerText = currentLang === 'ru' ? 'Скачать' : 'Download';

            // Show modal
            document.getElementById('appModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeAppModal() {
            document.getElementById('appModal').classList.remove('active');
            document.body.style.overflow = 'auto';
            selectedApp = null;
        }

        function toggleDescription(event) {
            const titleElement = event.currentTarget;
            const descFull = document.getElementById('descriptionFull');
            const descPreview = document.getElementById('descriptionPreview');
            
            titleElement.classList.toggle('expanded');
            descFull.classList.toggle('expanded');
            
            if (descFull.classList.contains('expanded')) {
                descPreview.style.display = 'none';
            } else {
                descPreview.style.display = 'block';
            }
        }

        function downloadApp() {
            if (selectedApp && selectedApp.downloadLink) {
                window.open(selectedApp.downloadLink, '_blank');
            }
        }

        // Close modal when clicking outside
        document.getElementById('appModal').addEventListener('click', (e) => {
            if (e.target.id === 'appModal') {
                closeAppModal();
            }
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase().trim();
            q ? executeSearch(q) : filterCategory(currentCategory);
        });

        document.getElementById('langToggle').addEventListener('click', (e) => {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            e.target.innerText = currentLang === 'ru' ? 'RU / EN' : 'EN / RU';
            document.getElementById('nav-games').innerText = currentLang === 'ru' ? 'Игры' : 'Games';
            document.getElementById('nav-apps').innerText = currentLang === 'ru' ? 'Прилож.' : 'Apps';
            document.getElementById('nav-search').innerText = currentLang === 'ru' ? 'Поиск' : 'Search';
            document.getElementById('nav-mods').innerText = currentLang === 'ru' ? 'Моддинг' : 'Mods';
            document.getElementById('nav-profile').innerText = currentLang === 'ru' ? 'Профиль' : 'Profile';
            
            const q = document.getElementById('searchInput').value.trim();
            q ? executeSearch(q.toLowerCase()) : filterCategory(currentCategory);
        });

        loadData();
    </script>
</body>
</html>
