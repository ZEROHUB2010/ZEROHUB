<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROHUBSTORE - Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        /* App Details Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            display: none;
        }

        .modal-overlay.active {
            display: block;
        }

        .app-details-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 1000;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(100%);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-details-modal.active {
            display: flex;
            align-items: flex-end;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 20px 20px 0 0;
            width: 100%;
            padding: 0;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideUp 0.3s ease-out;
        }

        @keyframes modalSlideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-content::-webkit-scrollbar {
            width: 8px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: var(--neon-green);
            border-radius: 4px;
        }

        .modal-close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-container {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .video-player {
            width: 100%;
            height: 250px;
            background: var(--bg-color);
            border-radius: 0;
        }

        .screenshots-carousel {
            position: relative;
            width: 100%;
            padding-top: 20px;
            padding-bottom: 10px;
        }

        .screenshots-scroll {
            display: flex;
            overflow-x: auto;
            padding: 0 15px;
            gap: 10px;
            scroll-behavior: smooth;
        }
        .screenshots-scroll::-webkit-scrollbar { display: none; }

        .screenshot {
            min-width: 100px;
            max-width: 100px;
            height: 180px;
            border-radius: 10px;
            object-fit: cover;
            cursor: pointer;
            transition: 0.2s;
        }

        .app-info {
            padding: 20px;
        }

        .app-header {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .app-icon-large {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            object-fit: cover;
        }

        .app-info-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .app-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .app-developer {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .app-meta {
            display: flex;
            gap: 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .download-btn {
            background: var(--neon-green);
            color: var(--bg-color);
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            transition: 0.2s;
        }
        .download-btn:active { opacity: 0.8; }

        .description-section {
            margin-bottom: 15px;
        }

        .description-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-main);
        }

        .description-text {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .description-text.expanded {
            -webkit-line-clamp: unset;
            white-space: normal;
        }

        .expand-btn {
            background: transparent;
            border: none;
            color: var(--neon-green);
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .expand-btn i {
            transition: 0.3s;
        }

        .expand-btn.expanded i {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">ZEROHUBSTORE</div>
        <button class="lang-btn" id="langToggle">RU / EN</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-bar" placeholder="Поиск игр и приложений...">
    </div>

    <div class="section-title">
        <span id="title-recommended">Игры</span> 
        <i class="fas fa-arrow-right" style="font-size: 14px;"></i>
    </div>
    
    <div id="apps-container" class="apps-scroll">
        <div class="empty-message">Загрузка данных из Firebase... ⏳</div>
    </div>

    <!-- App Details Modal -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="app-details-modal" id="appDetailsModal">
        <button class="modal-close-btn" onclick="closeAppDetails()">
            <i class="fas fa-times"></i>
        </button>
        <div class="modal-content">
            <div class="media-container">
                <video id="trailerVideo" class="video-player" controls>
                    <source src="" type="video/mp4">
                </video>
                <div class="screenshots-carousel">
                    <div class="screenshots-scroll" id="screenshotsScroll"></div>
                </div>
            </div>

            <div class="app-info">
                <div class="app-header">
                    <img id="modalAppIcon" src="" class="app-icon-large" onerror="this.src='https://placehold.co/100'">
                    <div class="app-info-text">
                        <div class="app-name" id="modalAppName">App Name</div>
                        <div class="app-developer" id="modalAppDeveloper">Developer</div>
                        <div class="app-meta">
                            <span id="modalAppSize">—</span>
                        </div>
                    </div>
                </div>

                <button class="download-btn" id="modalDownloadBtn">
                    <i class="fas fa-download"></i> Скачать
                </button>

                <div class="description-section">
                    <div class="description-title">
                        <span id="descTitle">Описание</span>
                        <button class="expand-btn" id="expandBtn" onclick="toggleDescription()">
                            <i class="fas fa-chevron-down"></i>
                        </button>
                    </div>
                    <div class="description-text" id="modalDescription">Description text</div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="filterCategory('game')">
            <i class="fas fa-gamepad"></i>
            <span id="nav-games">Игры</span>
        </div>
        <div class="nav-item" onclick="filterCategory('app')">
            <i class="fas fa-mobile-alt"></i>
            <span id="nav-apps">Прилож.</span>
        </div>
        <div class="nav-item" onclick="document.getElementById('searchInput').focus()">
            <i class="fas fa-search"></i>
            <span id="nav-search">Поиск</span>
        </div>
        <div class="nav-item" onclick="filterCategory('mod')">
            <i class="fas fa-tools"></i>
            <span id="nav-mods">Моддинг</span>
        </div>
        <a href="../admin/index.html" class="nav-item admin-nav">
            <i class="fas fa-user-shield"></i>
            <span id="nav-profile">Профиль</span>
        </a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDB_-vXWoIr5eriBNPKODNA5AYp-jDAUHU",
            authDomain: "zerohubstore-a2983.firebaseapp.com",
            databaseURL: "https://zerohubstore-a2983-default-rtdb.firebaseio.com",
            projectId: "zerohubstore-a2983",
            storageBucket: "zerohubstore-a2983.firebasestorage.app",
            messagingSenderId: "527606629633",
            appId: "1:527606629633:web:287254f0046715c5444700",
            measurementId: "G-S619Y9E16P"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allApps = [];
        let currentCategory = 'game';
        let currentLang = 'ru';
        let currentApp = null;

        // 1. БОР КАРДАН АЗ FIREBASE REALTIME DATABASE (ВАҚТИ ВОҚЕӢ)
        function loadData() {
            db.ref('apps').on('value', (snapshot) => {
                allApps = [];
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => {
                        allApps.push(data[key]);
                    });
                }
                
                // Санҷиш: агар корбар дар ҳоли ҷустуҷӯ бошад, онро вайрон намекунем
                const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
                if (searchQuery) {
                    executeSearch(searchQuery);
                } else {
                    filterCategory(currentCategory);
                }
            }, (error) => {
                console.error("Хатогӣ Firebase:", error);
                const errMsg = currentLang === 'ru' ? 'Ошибка загрузки данных' : 'Data loading error';
                document.getElementById('apps-container').innerHTML = 
                    `<div class="empty-message" style="color: #ff4444;">❌ ${errMsg}: ${error.message}</div>`;
            });
        }

        // 2. ФИЛТРАТСИЯ БА КАТЕГОРИЯ
        function filterCategory(category) {
            currentCategory = category.toLowerCase();
            
            const navItems = document.querySelectorAll('.bottom-nav .nav-item');
            if (navItems.length > 0) {
                navItems.forEach(item => item.classList.remove('active'));
                const indexMap = { 'game': 0, 'app': 1, 'mod': 3 };
                if (indexMap[currentCategory] !== undefined && navItems[indexMap[currentCategory]]) {
                    navItems[indexMap[currentCategory]].classList.add('active');
                }
            }

            document.getElementById('searchInput').value = '';
            const filtered = allApps.filter(item => item.type && item.type.toLowerCase() === currentCategory);

            const titleSpan = document.getElementById('title-recommended');
            if (titleSpan) {
                if (currentLang === 'ru') {
                    titleSpan.innerText = currentCategory === 'game' ? 'Игры' : currentCategory === 'app' ? 'Программы' : 'Модификации';
                } else {
                    titleSpan.innerText = currentCategory === 'game' ? 'Games' : currentCategory === 'app' ? 'Apps' : 'Mods';
                }
            }
            renderApps(filtered);
        }

        // 3. РЕНДЕР КАРТОЧКАҲО
        function renderApps(appsToRender) {
            const container = document.getElementById('apps-container');
            if (!container) return;

            if (!appsToRender || appsToRender.length === 0) {
                container.innerHTML = `<div class="empty-message">${currentLang === 'ru' ? 'Ничего не найдено' : 'Nothing found'}</div>`;
                return;
            }

            container.innerHTML = appsToRender.map(app => {
                const title = currentLang === 'ru' ? (app.nameRu || 'Без названия') : (app.nameEn || 'No Title');
                const btnText = currentLang === 'ru' ? 'Скачать' : 'Download';
                const icon = app.iconUrl || 'https://placehold.co/100';
                const size = app.size || '—';
                const link = app.downloadLink || '#';

                return `
                    <div class="app-card" onclick="openAppDetails('${JSON.stringify(app).replace(/'/g, '&#39;')}')">
                        <img src="${icon}" class="app-icon" alt="${title}" onerror="this.src='https://placehold.co/100'">
                        <div class="app-title">${title}</div>
                        <div class="app-size">${size}</div>
                        <button class="install-btn" onclick="event.stopPropagation(); window.open('${link}', '_blank')">
                            <i class="fas fa-download"></i> ${btnText}
                        </button>
                    </div>
                `;
            }).join('');
        }

        // 4. ФУНКСИЯИ ХУДИ ҶУСТУҶӮ
        function executeSearch(query) {
            const navItems = document.querySelectorAll('.bottom-nav .nav-item');
            if (navItems.length >= 3) {
                navItems.forEach(item => item.classList.remove('active'));
                navItems[2].classList.add('active');
            }

            const filtered = allApps.filter(app => 
                (app.nameRu && app.nameRu.toLowerCase().includes(query)) || 
                (app.nameEn && app.nameEn.toLowerCase().includes(query)) ||
                (app.category && app.category.toLowerCase().includes(query))
            );

            const titleSpan = document.getElementById('title-recommended');
            if (titleSpan) titleSpan.innerText = currentLang === 'ru' ? 'Результаты поиска' : 'Search Results';
            renderApps(filtered);
        }

        // APP DETAILS MODAL FUNCTIONS
        function openAppDetails(appJson) {
            try {
                const app = JSON.parse(appJson);
                currentApp = app;
                const modal = document.getElementById('appDetailsModal');
                const overlay = document.getElementById('modalOverlay');

                // Set app info
                document.getElementById('modalAppName').innerText = currentLang === 'ru' ? (app.nameRu || 'Без названия') : (app.nameEn || 'No Title');
                document.getElementById('modalAppDeveloper').innerText = app.developer || 'Unknown Developer';
                document.getElementById('modalAppIcon').src = app.iconUrl || 'https://placehold.co/100';
                document.getElementById('modalAppSize').innerText = app.size || '—';
                
                const descRu = app.descRu || '';
                const descEn = app.descEn || '';
                document.getElementById('modalDescription').innerText = currentLang === 'ru' ? descRu : descEn;
                document.getElementById('descTitle').innerText = currentLang === 'ru' ? 'Описание' : 'Description';

                // Set trailer video
                const trailerVideo = document.getElementById('trailerVideo');
                if (app.trailerUrl) {
                    trailerVideo.src = app.trailerUrl;
                } else {
                    trailerVideo.src = '';
                }

                // Set screenshots
                const screenshotsContainer = document.getElementById('screenshotsScroll');
                screenshotsContainer.innerHTML = '';
                
                if (app.screenshots) {
                    let screenshotArray = [];
                    if (typeof app.screenshots === 'string') {
                        screenshotArray = app.screenshots.split(',').map(s => s.trim());
                    } else if (Array.isArray(app.screenshots)) {
                        screenshotArray = app.screenshots;
                    }
                    
                    screenshotArray.forEach(screenshot => {
                        if (screenshot) {
                            const img = document.createElement('img');
                            img.src = screenshot;
                            img.className = 'screenshot';
                            img.onerror = () => img.style.display = 'none';
                            screenshotsContainer.appendChild(img);
                        }
                    });
                }

                // Set download button
                const downloadBtn = document.getElementById('modalDownloadBtn');
                downloadBtn.innerText = currentLang === 'ru' ? '⬇ Скачать' : '⬇ Download';
                downloadBtn.onclick = () => window.open(app.downloadLink, '_blank');

                // Reset description state
                document.getElementById('modalDescription').classList.remove('expanded');
                document.getElementById('expandBtn').classList.remove('expanded');

                // Show modal
                modal.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            } catch (e) {
                console.error('Error parsing app data:', e);
            }
        }

        function closeAppDetails() {
            const modal = document.getElementById('appDetailsModal');
            const overlay = document.getElementById('modalOverlay');
            modal.classList.remove('active');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            document.getElementById('modalDescription').classList.remove('expanded');
            document.getElementById('expandBtn').classList.remove('expanded');
        }

        function toggleDescription() {
            const descText = document.getElementById('modalDescription');
            const expandBtn = document.getElementById('expandBtn');
            
            descText.classList.toggle('expanded');
            expandBtn.classList.toggle('expanded');
        }

        // Close modal when clicking overlay
        document.getElementById('modalOverlay').addEventListener('click', closeAppDetails);

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeAppDetails();
        });

        // СУШУДАН БА САТРИ ҶУСТУҶӮ
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (!query) {
                filterCategory(currentCategory);
                return;
            }
            executeSearch(query);
        });

        // 5. ИВАЗИ ЗАБОН (RU/EN)
        document.getElementById('langToggle').addEventListener('click', (e) => {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            e.target.innerText = currentLang === 'ru' ? 'RU / EN' : 'EN / RU';

            document.getElementById('nav-games').innerText = currentLang === 'ru' ? 'Игры' : 'Games';
            document.getElementById('nav-apps').innerText = currentLang === 'ru' ? 'Прилож.' : 'Apps';
            document.getElementById('nav-search').innerText = currentLang === 'ru' ? 'Поиск' : 'Search';
            document.getElementById('nav-mods').innerText = currentLang === 'ru' ? 'Моддинг' : 'Mods';
            document.getElementById('nav-profile').innerText = currentLang === 'ru' ? 'Профиль' : 'Profile';
            document.getElementById('searchInput').placeholder = currentLang === 'ru' ? 'Поиск игр и приложений...' : 'Search games and apps...';

            // Update modal if open
            if (currentApp && document.getElementById('appDetailsModal').classList.contains('active')) {
                document.getElementById('modalAppName').innerText = currentLang === 'ru' ? (currentApp.nameRu || 'Без названия') : (currentApp.nameEn || 'No Title');
                document.getElementById('modalDescription').innerText = currentLang === 'ru' ? (currentApp.descRu || '') : (currentApp.descEn || '');
                document.getElementById('descTitle').innerText = currentLang === 'ru' ? 'Описание' : 'Description';
                document.getElementById('modalDownloadBtn').innerText = currentLang === 'ru' ? '⬇ Скачать' : '⬇ Download';
            }

            const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            if (searchQuery) {
                executeSearch(searchQuery);
            } else {
                filterCategory(currentCategory);
            }
        });

        // ОҒОЗ БОР КАРДАНИ МАЪЛУМОТ
        loadData();
    </script>
</body>
</html>
