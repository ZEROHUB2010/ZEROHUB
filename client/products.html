<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROHUB - Каталог приложений и игр</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .catalog-header { margin-top: 30px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .catalog-title { font-size: 24px; font-weight: 700; }
        .search-wrapper { position: relative; width: 100%; max-width: 400px; }
        .search-wrapper input { width: 100%; background: var(--bg-card); border: 1px solid var(--border-color); padding: 12px 16px 12px 45px; border-radius: 12px; color: var(--text-main); font-size: 14px; outline: none; transition: var(--transition-smooth); }
        .search-wrapper input:focus { border-color: var(--primary); }
        .search-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; min-height: 40vh; }
        
        @media (max-width: 576px) {
            .catalog-header { flex-direction: column; align-items: flex-start; }
            .search-wrapper { max-width: 100%; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <a href="index.html" class="logo">ZERO<span>HUB</span></a>
            </div>
            <nav class="nav-links">
                <a href="index.html"><i class="fa-solid fa-house"></i> <span class="nav-home">Главная</span></a>
                <a href="products.html?type=apps" class="nav-apps-link"><i class="fa-solid fa-mobile-screen-button"></i> <span class="nav-apps">Приложения</span></a>
                <a href="products.html?type=games" class="nav-games-link"><i class="fa-solid fa-gamepad"></i> <span class="nav-games">Игры</span></a>
            </nav>
            <div class="user-actions">
                <!-- Тугмаи забон тавассути JS илова мешавад -->
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="container">
        <div class="catalog-header">
            <h1 id="catalogTitle" class="catalog-title">Все приложения и игры</h1>
            
            <!-- Ҷустуҷӯи зинда (Живой Поиск) -->
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="catalogSearch" placeholder="Поиск в каталоге...">
            </div>
        </div>

        <!-- ГРИД БАРОИ БАРНОМАҲО -->
        <div id="catalogGrid" class="catalog-grid">
            <!-- Маҳсулот тавассути JS бор мешаванд -->
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="main-footer">
        <div class="container footer-content">
            <p>&copy; 2026 ZEROHUB Platform. All rights reserved.</p>
        </div>
    </footer>

    <!-- Пайваст кардани логикаи каталог -->
    <script type="module" src="products.js"></script>
</body>
</html>
